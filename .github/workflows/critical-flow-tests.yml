name: Critical flow tests

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: critical-flow-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Critical flow tests
        run: npm run test:critical

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build
